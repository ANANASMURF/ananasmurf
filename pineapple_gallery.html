<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ananasmurf</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/ananas.jpg" type="image/jpg">
</head>
<body>
  <img src="images/ananas.jpg" alt="Ananas" class="logo" id="logoBtn">
  <h1>PINEAPPLE AI image Gallery</h1>
  <br>
<div id="lightbox" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); justify-content:center; align-items:center;">

  <button id="prev" style="position:absolute; left:30px; font-size:40px; background:none; color:white; border:none; cursor:pointer;">❮</button>

  <img id="lightbox-img" style="max-width:80%; max-height:80%; border-radius:10px;">

  <button id="next" style="position:absolute; right:30px; font-size:40px; background:none; color:white; border:none; cursor:pointer;">❯</button>

</div>
<div class="galerie">
    <img src="images/ananas.jpg" alt="Image 1">
    <img src="images/ananas.gif" alt="Image 2">
    <img src="images/ananas0 (1) - Copie.jpg" alt="Image 3">
    <img src="images/ananas0 (2) - Copie.jpg" alt="Image 4">
    <img src="images/ananas0 (3) - Copie.jpg" alt="Image 5">
    <img src="images/ananas0 (1) - Copie.png" alt="Image 6">
    <img src="images/ananas0 (2) - Copie.png" alt="Image 7">



<script src="js/scriptgallery.js"></script>
</body>
</html>
